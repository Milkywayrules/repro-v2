name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/repro_v2_test
  BETTER_AUTH_SECRET: test-secret-must-be-at-least-32-chars-long
  BETTER_AUTH_URL: http://localhost:5000
  CORS_ORIGIN: http://localhost:5001
  NODE_ENV: test
  PORT: 5000
  NEXT_PUBLIC_API_URL: http://localhost:5000
  NEXT_PUBLIC_CONSOLE_URL: http://localhost:5001
  NEXT_PUBLIC_MARKETING_URL: http://localhost:5002
  NEXT_PUBLIC_DOCS_URL: http://localhost:5009

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: repro_v2_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d repro_v2_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Push database schema
        # TODO: switch to db:migrate once migration workflow is finalized
        run: bun run db:push

      - name: Typecheck
        run: bun run check-types

      - name: Lint
        run: bun run check

      - name: Test
        run: bun run test

      - name: Verify generated API types
        run: |
          bun run generate:api-types
          git diff --exit-code packages/api-types/src/generated

      - name: Build
        run: bun run build

      - name: Dependency audit
        continue-on-error: true
        run: bun audit

      - name: Build Firefox extension zip
        run: bun run --filter browser-ext zip:firefox
